name: Build uPic (Personal Use)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: List available schemes
        run: xcodebuild -project uPic.xcodeproj -list

      - name: Build with Xcode
        run: |
          xcodebuild \
            -project uPic.xcodeproj \
            -scheme "uPic(Release)" \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package .app into zip
        run: |
          APP_PATH=$(find ./build/Build/Products/Release -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          zip -r uPic-latest.zip "$APP_PATH"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: uPic-macOS-latest
          path: uPic-latest.zip
          retention-days: 30
